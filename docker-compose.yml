services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the host-local default in app/config.py so the api container
      # reaches the `redis` service over the internal docker network.
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No `ports:` block — Redis is only reachable from the api container over the
    # internal docker network (hostname `redis`). Do NOT publish 6379 to the host;
    # an open Redis on the public internet is a known attack target.
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
